name: Node.js CI, Load Testing, SAST & CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ---------------------------------------------------
  # FASE 1: Pruebas Unitarias
  # ---------------------------------------------------
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.20.0, 18.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Jest tests
        run: npm test

  # ---------------------------------------------------
  # FASE 2: Pruebas de Carga
  # ---------------------------------------------------
  load-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.20.0
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Start the Express application
        run: node ./bin/www & 
        
      - name: Wait for server to be ready
        run: sleep 5
        
      - name: Setup K6
        uses: grafana/setup-k6-action@v1

      - name: Run K6 load test and stream to Grafana Cloud
        run: k6 run k6-test.js --out cloud
        env:
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}

  # ---------------------------------------------------
  # FASE 3: Análisis Estático (SAST)
  # ---------------------------------------------------
  sonarQube-analysis:
    name: Análisis SAST
    runs-on: ubuntu-latest
    steps:
      - name: Clonación del repositorio (Checkout)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          
      - name: Ejecución de Escáner SonarQube
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=node-proyect
            -Dsonar.qualitygate.wait=true

  # ---------------------------------------------------
  # FASE 4: Empaquetado Docker (GHCR)
  # ---------------------------------------------------
  docker-build:
    name: Empaquetado Docker (GHCR)
    needs: [load-test, sonarQube-analysis]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convertir nombre de repo a minúsculas para Docker
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Construir y subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}:latest

  # ---------------------------------------------------
  # FASE 5: Despliegue Continuo (CD) vía Bastion Host
  # ---------------------------------------------------
  deploy:
    name: Despliegue en Producción
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Conexión SSH y Despliegue Docker
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_username: ${{ secrets.PROXY_USERNAME }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GH_TOKEN, REPO_NAME
          script: |
            # 1. Convertir nombre del repo a minúsculas
            REPO_LC=$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')
            
            # 2. Autenticarse en el registro de GitHub
            echo $GH_TOKEN | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 3. Limpiar versión anterior
            sudo docker stop app-node-prod || true
            sudo docker rm app-node-prod || true
            
            # 4. Descargar nueva versión y ejecutar
            sudo docker pull ghcr.io/$REPO_LC:latest
            sudo docker run -d -p 3000:3000 --name app-node-prod ghcr.io/$REPO_LC:latest
            
