name: Node.js CI, Load Testing, SAST & CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ---------------------------------------------------
  # FASE 1: Pruebas Unitarias
  # ---------------------------------------------------
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.20.0, 18.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Jest tests
        run: npm test

  # ---------------------------------------------------
  # FASE 2: Pruebas de Carga
  # ---------------------------------------------------
  load-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.20.0
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Start the Express application
        run: node ./bin/www & 
        
      - name: Wait for server to be ready
        run: sleep 5
        
      - name: Setup K6
        uses: grafana/setup-k6-action@v1

      - name: Run K6 load test and stream to Grafana Cloud
        run: k6 run k6-test.js --out cloud
        env:
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}

  # ---------------------------------------------------
  # FASE 3: Análisis Estático (SAST)
  # ---------------------------------------------------
  sonarQube-analysis:
    name: Análisis SAST
    runs-on: ubuntu-latest
    steps:
      - name: Clonación del repositorio (Checkout)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          
      - name: Ejecución de Escáner SonarQube
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=node-proyect
            -Dsonar.qualitygate.wait=true

  # ---------------------------------------------------
  # FASE 4: Empaquetado Docker (GHCR)
  # ---------------------------------------------------
  docker-build:
    name: Empaquetado Docker (GHCR)
    needs: [load-test, sonarQube-analysis]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convertir nombre de repo a minúsculas para Docker
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Construir y subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}:latest

# ---------------------------------------------------
  # FASE 5: Blue-Green Deployment Real (Docker + Nginx)
  # ---------------------------------------------------
  deploy:
    name: Despliegue en Producción (Zero-Downtime)
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      # --- PASO 1: DESPLEGAR EN EL ENTORNO INACTIVO (SERVIDOR PRIVADO) ---
      - name: 1. Levantar contenedor paralelo en Servidor Privado
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_username: ${{ secrets.PROXY_USERNAME }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GH_TOKEN, REPO_NAME
          script: |
            echo "--- PREPARANDO CONTENEDOR DOCKER ---"
            
            # 1. Leer qué contenedor está activo actualmente
            if [ -f ~/current_deploy.env ]; then
              source ~/current_deploy.env
            else
              CURRENT_COLOR="Blue"
            fi
            
            # 2. Invertir la lógica: Si estamos en Blue, el objetivo a actualizar es Green
            if [ "$CURRENT_COLOR" == "Blue" ]; then
              TARGET_COLOR="Green"
              TARGET_PORT="3001"
            else
              TARGET_COLOR="Blue"
              TARGET_PORT="3000"
            fi
            
            echo "El tráfico actual está en $CURRENT_COLOR. Actualizando el entorno inactivo: $TARGET_COLOR (Puerto $TARGET_PORT)..."
            
            REPO_LC=$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')
            echo $GH_TOKEN | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 3. Limpiar SOLO el contenedor inactivo (El activo sigue sirviendo a los usuarios)
            sudo docker stop app-node-$TARGET_COLOR || true
            sudo docker rm app-node-$TARGET_COLOR || true
            
            # 4. Descargar y encender el nuevo contenedor
            sudo docker pull ghcr.io/$REPO_LC:latest
            sudo docker run -d -p $TARGET_PORT:3000 --name app-node-$TARGET_COLOR ghcr.io/$REPO_LC:latest
            
            # 5. Guardar el estado para la próxima vez
            echo "CURRENT_COLOR=$TARGET_COLOR" > ~/current_deploy.env

      # --- PASO 2: CONMUTAR EL TRÁFICO (SERVIDOR PÚBLICO) ---
      - name: 2. Conmutación Blue-Green en Nginx Público
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROXY_HOST }}
          username: ${{ secrets.PROXY_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "--- CAMBIANDO SEMÁFORO EN NGINX ---"
            
            # Usamos ruta absoluta para el archivo de estado
            if [ -f /home/alexislozadasalinas11/current_deploy.env ]; then
              source /home/alexislozadasalinas11/current_deploy.env
            else
              CURRENT_COLOR="Blue"
            fi
            
            if [ "$CURRENT_COLOR" == "Blue" ]; then
              TARGET_COLOR="Green"
              TARGET_PORT="3001"
            else
              TARGET_COLOR="Blue"
              TARGET_PORT="3000"
            fi
            
            export APP_TARGET_IP="10.0.2.3"
            export APP_TARGET_PORT=$TARGET_PORT
            export DEPLOYMENT_COLOR=$TARGET_COLOR
            
            echo "Enrutando usuarios hacia la nueva versión en: $TARGET_COLOR ($APP_TARGET_IP:$TARGET_PORT)"
            
            # Usamos ruta absoluta para la plantilla
            envsubst '${APP_TARGET_IP} ${APP_TARGET_PORT} ${DEPLOYMENT_COLOR}' < /home/alexislozadasalinas11/nginx.conf.template | sudo tee /etc/nginx/conf.d/default.conf > /dev/null
            
            sudo nginx -t
            if [ $? -eq 0 ]; then
              sudo systemctl reload nginx
              # Usamos ruta absoluta para guardar el nuevo estado
              echo "CURRENT_COLOR=$TARGET_COLOR" > /home/alexislozadasalinas11/current_deploy.env
              echo "¡Conmutación a $TARGET_COLOR exitosa! Zero-Downtime logrado."
            else
              echo "Error crítico en la sintaxis de Nginx."
              exit 1
            fi
